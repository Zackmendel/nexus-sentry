<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The No-Cap Newsreel - Hackathon Demo</title>
    <style>
        body { background: #1a1a1a; color: gold; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 50px; }
        .container { border: 5px solid gold; padding: 20px; display: inline-block; border-radius: 15px; background: #000; }
        h1 { text-transform: uppercase; letter-spacing: 5px; }
        /* Style the ElevenLabs widget */
        elevenlabs-convai { margin-top: 20px; --orb-color-1: #ffd700; --orb-color-2: #b8860b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📻 No-Cap Newsreel 📻</h1>
        <p>Fact-Checking & Slang Translation Live from 1944</p>
        
        <elevenlabs-convai 
            agent-id="agent_0501kmb6q93mfvbshv97bxcnbhpe"
            variant="expanded"
        ></elevenlabs-convai>

        <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
    </div>

    <script>
        // CRITICAL HACK: Force Chrome to ignore echo cancellation
        // This is why your dashboard wasn't working!
        navigator.mediaDevices.getUserMedia = (orig => {
            return function (constraints) {
                if (constraints.audio) {
                    constraints.audio = {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    };
                }
                return orig.call(navigator.mediaDevices, constraints);
            };
        })(navigator.mediaDevices.getUserMedia);
    </script>
</body>
</html>
